<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Avatar RPG — Sistema Completo v6</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--bg2:#161b25;--bg3:#1e2535;
  --border:#2a3345;--border2:#3a4a65;
  --text:#e8edf5;--text2:#8a9ab5;--text3:#4a5a75;
  --fire:#e05a2a;--fire-bg:#1a0e08;--fire-light:#f09070;
  --water:#2a7adf;--water-bg:#08101a;--water-light:#70b0f0;
  --earth:#4a9920;--earth-bg:#0a1408;--earth-light:#80c050;
  --air:#c07510;--air-bg:#1a1008;--air-light:#f0b050;
  --none:#7a8a9a;--none-bg:#10141a;--none-light:#b0c0d0;
  --spirit:#7a70e0;--agility:#20a070;--precise:#d05080;--brute:#e05a2a;
  --gold:#c0a030;--red:#e03030;--green:#30c060;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:16px}
/* NAV TABS */
.nav{display:flex;gap:4px;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px;flex-wrap:wrap}
.nav-btn{padding:8px 16px;border-radius:6px 6px 0 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;border-bottom:2px solid transparent}
.nav-btn:hover{color:var(--text);background:var(--bg2)}
.nav-btn.on{color:var(--text);border-bottom-color:var(--fire);background:var(--bg2)}
.nav-btn.fire.on{border-bottom-color:var(--fire);color:var(--fire-light)}
.nav-btn.water.on{border-bottom-color:var(--water);color:var(--water-light)}
.nav-btn.earth.on{border-bottom-color:var(--earth);color:var(--earth-light)}
.nav-btn.air.on{border-bottom-color:var(--air);color:var(--air-light)}
.nav-btn.none.on{border-bottom-color:var(--none);color:var(--none-light)}
.nav-btn.char.on{border-bottom-color:var(--gold);color:var(--gold)}
.nav-btn.items-tab.on{border-bottom-color:var(--green);color:var(--green)}
.page{display:none}.page.on{display:block}
/* LAYOUT */
.two-col{display:grid;grid-template-columns:240px 1fr;gap:12px;align-items:start}
/* ATTR PANEL */
.attr-panel{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;position:sticky;top:8px}
.panel-title{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.level-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.lv-num{font-size:22px;font-weight:700;color:var(--gold)}
.lv-lbl{font-size:10px;color:var(--text3)}
.pts-box{background:var(--bg3);border-radius:6px;padding:6px 10px;margin-bottom:10px;font-size:12px;color:var(--text2)}
.pts-val{font-weight:600;color:var(--text);font-size:15px}
.attr-row{margin-bottom:9px}
.attr-hd{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-bottom:3px}
.attr-bar-bg{height:5px;background:var(--bg3);border-radius:3px;margin-bottom:4px;overflow:hidden}
.attr-bar{height:100%;border-radius:3px;transition:width .2s}
.attr-ctl{display:flex;align-items:center;gap:4px}
.ab{width:22px;height:22px;border-radius:4px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .1s}
.ab:hover{background:var(--border2)}
.av{font-size:13px;font-weight:600;color:var(--text);min-width:22px;text-align:center}
/* STATS BOX */
.stats-box{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:11px}
.stat-lbl{color:var(--text2)}
.stat-val{font-weight:600;font-size:12px}
.stat-bar-wrap{width:60px;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;display:inline-block;margin:0 6px;vertical-align:middle}
.stat-bar-inner{height:100%;border-radius:2px}
/* XP */
.xp-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
.xp-hd{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px}
.xp-bg{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.xp-fill{height:100%;background:var(--spirit);border-radius:3px;transition:width .3s}
.xp-btn{margin-top:6px;width:100%;padding:6px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;font-size:11px}
.xp-btn:hover{background:var(--bg3);color:var(--text)}
/* SLOTS */
.slots-box{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px}
.slots-row{display:flex;justify-content:space-between;margin-bottom:4px}
.slots-val{font-weight:600;color:var(--gold)}
/* CAT TABS */
.cat-tabs{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
.ctab{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:11px;font-weight:500;transition:all .12s}
.ctab:hover{border-color:var(--border2);color:var(--text)}
.ctab.on{border-width:1.5px}
.ctab.spirit.on{border-color:var(--spirit);color:var(--spirit);background:#1a1830}
.ctab.agility.on{border-color:var(--agility);color:var(--agility);background:#0a1a14}
.ctab.precise.on{border-color:var(--precise);color:var(--precise);background:#1a0810}
.ctab.brute.on{border-color:var(--brute);color:var(--brute);background:#1a0a04}
.cat-panel{display:none}.cat-panel.on{display:block}
.cat-desc{font-size:11px;color:var(--text2);margin-bottom:10px;line-height:1.5;padding:8px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--border2)}
.tier-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:10px 0 5px}
.skills-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:8px;margin-bottom:4px}
/* SKILL CARD */
.sc{border:1px solid var(--border);border-radius:8px;padding:11px;background:var(--bg2);cursor:pointer;transition:all .12s;position:relative}
.sc:hover:not(.locked){border-color:var(--border2);background:var(--bg3)}
.sc.locked{opacity:.35;cursor:not-allowed}
.sc.on{border-width:1.5px}
.sc.spirit.on{border-color:var(--spirit);background:#1a1830}
.sc.agility.on{border-color:var(--agility);background:#0a1a14}
.sc.precise.on{border-color:var(--precise);background:#1a0810}
.sc.brute.on{border-color:var(--brute);background:#1a0a04}
.sc.legend{background:#1a1208}
.sc.legend.on{border-color:var(--gold)}
.sdot{position:absolute;top:9px;right:9px;width:7px;height:7px;border-radius:50%;background:var(--border2)}
.sc.on .sdot{background:var(--agility)}
.sname{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px;padding-right:14px}
.sdesc{font-size:10px;color:var(--text2);line-height:1.4;margin-bottom:6px}
.smeta{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-bottom:5px}
.sbadge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;display:inline-block}
.sb-t1{background:#1e2535;color:#8a9ab5}
.sb-t2{background:#1a1008;color:#c07510}
.sb-t3{background:#180e28;color:#9070d0}
.sb-t4{background:#1a0a04;color:#e05a2a}
.sb-leg{background:#1a1208;color:#c0a030}
.pos-badge{font-size:9px;padding:1px 6px;border-radius:4px;font-weight:500;display:inline-block}
.pos-def{background:#08101a;color:#2a7adf}
.pos-off{background:#1a0e08;color:#e05a2a}
.pos-pass{background:#101418;color:#7a8a9a}
.pos-any{background:#0a1408;color:#4a9920}
.req-attr{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.chip{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600}
.cFOR{background:#1a0808;color:#e07050}
.cAGI{background:#0a1808;color:#60c070}
.cCHI{background:#10081a;color:#9070d0}
.cPER{background:#08101a;color:#5090e0}
.cRES{background:#0a1408;color:#70b050}
.cESP{background:#1a0814;color:#d070a0}
.req-line{font-size:9px;color:var(--text3);margin-top:2px}
/* EFFECTS & ATTACKS */
.eff-section,.atk-section{margin-top:7px;border-top:1px solid var(--border);padding-top:7px}
.sec-lbl{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.atk-row{display:grid;grid-template-columns:1fr auto auto;gap:3px;align-items:start;padding:3px 0;border-bottom:1px solid var(--border)}
.atk-row:last-child{border-bottom:none}
.an{font-size:10px;font-weight:500;color:var(--text)}
.ad{font-size:9px;color:var(--text3);line-height:1.3;margin-top:1px}
.atk-chips{display:flex;gap:3px;flex-wrap:wrap;margin-top:2px}
.achip{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:600;white-space:nowrap}
.ac-dmg{background:#1a0808;color:#e08060}
.ac-chi{background:#10081a;color:#9070d0}
.ac-res{background:#0a1808;color:#50b070}
/* STATUS BADGES */
.st{font-size:9px;padding:1px 4px;border-radius:3px;font-weight:500;display:inline-block;margin:1px}
.s-burn{background:#1a0808;color:#e07050}
.s-freeze{background:#08101a;color:#5090d0}
.s-shock{background:#10081a;color:#9070d0}
.s-blind{background:#0a0a0a;color:#b0b0b0}
.s-slow{background:#1a1008;color:#c09030}
.s-stun{background:#1a0810;color:#d06090}
.s-poison{background:#0a1408;color:#60b050}
.s-regen{background:#081408;color:#50c070}
.s-shield{background:#081018;color:#4080c0}
.s-silence{background:#141414;color:#808090}
.s-bleed{background:#1a0808;color:#e05050}
.s-root{background:#0a1408;color:#70a050}
.s-fear{background:#181018;color:#a070b0}
/* SLOT SELECTOR */
.slot-picker{margin-top:6px;border-top:1px solid var(--border);padding-top:6px}
.slot-lbl{font-size:9px;color:var(--text3);margin-bottom:4px}
.slot-btns{display:flex;flex-wrap:wrap;gap:3px}
.slot-btn{padding:2px 6px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;font-size:9px;transition:all .1s}
.slot-btn:hover{border-color:var(--border2)}
.slot-btn.active{border-color:var(--gold);color:var(--gold);background:#1a1408}
/* CHARACTER PAGE */
.char-page{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.char-section{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px}
.char-section h3{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.field-row{margin-bottom:8px}
.field-lbl{font-size:10px;color:var(--text2);margin-bottom:3px}
.field-input{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:5px;color:var(--text);font-size:12px;outline:none}
.field-input:focus{border-color:var(--border2)}
textarea.field-input{resize:vertical;min-height:60px;font-family:inherit}
.stat-display{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.stat-card{background:var(--bg3);border-radius:6px;padding:8px;text-align:center}
.stat-card-lbl{font-size:10px;color:var(--text3);margin-bottom:2px}
.stat-card-val{font-size:18px;font-weight:700;color:var(--gold)}
.stat-card-max{font-size:10px;color:var(--text3)}
.bar-wrap{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-top:4px}
.bar-inner{height:100%;border-radius:3px;transition:width .3s}
.active-skills-list{max-height:200px;overflow-y:auto}
.active-skill-item{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;border-radius:4px;background:var(--bg3);margin-bottom:3px;font-size:11px}
.rem-btn{padding:1px 6px;border-radius:3px;border:1px solid var(--red);color:var(--red);background:transparent;cursor:pointer;font-size:10px}
.rem-btn:hover{background:#1a0808}
/* ITEMS PAGE */
.items-page{}
.items-nav{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.icat-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:11px;font-weight:500}
.icat-btn:hover{border-color:var(--border2);color:var(--text)}
.icat-btn.on{border-color:var(--green);color:var(--green);background:#081408}
.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px}
.item-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px}
.item-card:hover{border-color:var(--border2)}
.item-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.item-desc{font-size:10px;color:var(--text2);line-height:1.4;margin-bottom:6px}
.item-chips{display:flex;gap:4px;flex-wrap:wrap}
.item-chip{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:500}
.ic-dmg{background:#1a0808;color:#e08060}
.ic-def{background:#08101a;color:#5090d0}
.ic-price{background:#1a1208;color:#c0a030}
.ic-wt{background:#101418;color:#8090a0}
.ic-elem{border-radius:3px;font-size:9px;padding:1px 5px;font-weight:600}
.ic-fire{background:#1a0808;color:#e05a2a}
.ic-water{background:#08101a;color:#2a7adf}
.ic-earth{background:#0a1408;color:#4a9920}
.ic-air{background:#1a1008;color:#c07510}
.ic-none{background:#101418;color:#7a8a9a}
.ic-special{background:#1a1208;color:#c0a030}
.add-inv-btn{margin-top:6px;width:100%;padding:5px;border-radius:5px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;font-size:10px}
.add-inv-btn:hover{color:var(--green);border-color:var(--green)}
/* XP TABLE */
.xp-page{max-width:700px}
.xp-tbl{width:100%;border-collapse:collapse;font-size:12px}
.xp-tbl th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border2);color:var(--text2);font-weight:500;font-size:11px}
.xp-tbl td{padding:5px 10px;border-bottom:1px solid var(--border);color:var(--text)}
.xp-tbl tr:nth-child(even) td{background:var(--bg2)}
.xp-tbl tr.mile td{background:#1a1408;color:var(--gold);font-weight:600}
/* RESPONSIVE */
@media(max-width:800px){.two-col{grid-template-columns:1fr}.char-page{grid-template-columns:1fr}.attr-panel{position:static}}
.elem-sel{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.esbtn{padding:7px 16px;border-radius:8px 8px 0 0;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.esbtn:hover{color:var(--text);background:var(--bg2)}
.esbtn.fire.on{border-bottom-color:var(--fire);color:var(--fire-light);background:var(--bg2)}
.esbtn.water.on{border-bottom-color:var(--water);color:var(--water-light);background:var(--bg2)}
.esbtn.earth.on{border-bottom-color:var(--earth);color:var(--earth-light);background:var(--bg2)}
.esbtn.air.on{border-bottom-color:var(--air);color:var(--air-light);background:var(--bg2)}
.esbtn.none.on{border-bottom-color:var(--none);color:var(--none-light);background:var(--bg2)}
</style>
</head>
<body>
<div class="app">
  <div class="nav">
    <button class="nav-btn char" onclick="showPage('char')">Personagem</button>
    <button class="nav-btn fire on" onclick="showPage('habilidades')">Habilidades</button>
    <button class="nav-btn items-tab" onclick="showPage('items')">Itens</button>
    <button class="nav-btn" onclick="showPage('xptable')" style="color:var(--text2)">Niveis XP</button>
  </div>
  <div id="pg-char"        class="page on"></div>
  <div id="pg-habilidades" class="page"></div>
  <div id="pg-items"       class="page"></div>
  <div id="pg-xptable"     class="page"></div>
  <!-- páginas internas usadas pelo renderSkillPage -->
  <div id="pg-fire"  style="display:none"></div>
  <div id="pg-water" style="display:none"></div>
  <div id="pg-earth" style="display:none"></div>
  <div id="pg-ar"    style="display:none"></div>
  <div id="pg-none"  style="display:none"></div>
</div>

const ELEMS=buildElemsFromPatch();

function buildElemsFromPatch(){
  const elems={};
  const tierNames={fire:["Iniciante","Avancado","Mestre","Lendario"],water:["Iniciante","Avancado","Mestre","Lendario"],earth:["Iniciante","Avancado","Mestre","Lendario"],air:["Iniciante","Avancado","Mestre","Lendario"],none:["Recruta","Veterano","Elite","Lenda"]};
  for(const el of ['fire','water','earth','air','none']){
    elems[el]={tiers:tierNames[el].map((t,i)=>({t,b:`t${i+1}`})),cats:{spirit:[],agility:[],precise:[],brute:[]}};
    const patch=PATCH[el]||{};
    for(const [sname, sdata] of Object.entries(patch)){
      const cat=inferCat(el,sname,sdata);
      const s={
        n:sname,
        d:sdata.d||sdata.desc||'',
        tier:tierFromNum(sdata.tier||1),
        req:sdata.req||[],
        pos:sdata.pos||'off',
        reqs:sdata.reqs||{},
        attacks:sdata.attacks||[],
        effect:sdata.effect||null
      };
      elems[el].cats[cat].push(s);
    }
  }
  return elems;
}

function tierFromNum(n){
  // tier in JSON: 1,2,3,4 -> index 0,1,2,3
  if(typeof n==='number') return Math.max(0,n-1);
  return 0;
}

function inferCat(el,name,data){
  const CAT_MAP={
    fire:{
      spirit:['Respiracao do Dragao','Danca do Dragao','Meditacao Solar'],
      agility:['Foguete Humano','Esquiva Flamejante'],
      precise:['Escudo de Calor'],
      brute:['Nova de Fogo','Muralha de Chamas','Tornado de Fogo','Explosao Final']
    },
    water:{
      spirit:['Cura por Agua','Ligacao Lunar','Dobra de Sangue'],
      agility:['Redemoinho','Pontes de Gelo','Corrente Submarina','Esquiva Fluida','Forma da Agua'],
      precise:['Escudo Aquatico'],
      brute:['Tsunami','Gelo Absoluto','Forca do Oceano']
    },
    earth:{
      spirit:['Visao Sismica','Vontade Inabalavel','Visao Profunda','Memoria da Pedra','Voz da Terra'],
      agility:['Surf de Terra','Passo Sismico','Tunel Rapido','Plataforma Elevatoria','Deslize Sismico','Salto de Catapulta','Fantasma de Terra'],
      precise:['Muralha de Terra'],
      brute:['Terremoto','Avalanche','Erupcao Vulcanica']
    },
    air:{
      spirit:['Desapego Total','Ligacao ao Espirito','Projecao Espiritual','Respiracao Cosmica','Fusao Espiritual'],
      agility:['Voo com Planador','Correntes Globais','Voo Livre'],
      precise:['Esfera de Ar','Esquiva Perfeita','Escudo de Ar'],
      brute:['Tornado','Explosao de Pressao','Tempestade Total']
    },
    none:{
      spirit:['Resistencia Mental','Visao de Combate','Chi Bloqueado','Serenidade do Kyoshi','Espirito Inquebravel'],
      agility:['Corrida de Telhados','Cables e Ganchos','Evasao Extrema','Sombra'],
      precise:['Chi Blocking','Armas de Precisao','Neutralizacao','Assassino de Dobras'],
      brute:['Forca Bruta','Armadura Pesada']
    }
  };
  const elMap=CAT_MAP[el]||{};
  for(const [cat,names] of Object.entries(elMap)){if(names.includes(name))return cat;}
  const pos=data.pos||''; const reqs=data.reqs||{};
  if(pos==='pass'&&(reqs.ESP>=3||reqs.CHI>=4))return 'spirit';
  if(reqs.ESP>=4)return 'spirit';
  const n=name.toLowerCase();
  if(n.includes('voo')||n.includes('surf')||n.includes('tunel')||n.includes('esfera')||
     n.includes('esquiva')||n.includes('planador')||n.includes('corrida')||
     n.includes('sombra')||n.includes('cables')||n.includes('evasao')||
     n.includes('passo')||n.includes('foguete')||n.includes('propulsao')||
     n.includes('deslize')||n.includes('plataforma')||n.includes('redemoinho'))return 'agility';
  if(reqs.PER>=3||n.includes('escudo')||n.includes('chi block')||
     n.includes('lamina')||n.includes('vortice'))return 'precise';
  return 'brute';
}

function calcStats(){
  const a=G.attrs,lv=G.level;
  return{
    vida:     10+(lv*8)+(a.FOR*3),
    espirito: 8+(lv*6)+(a.ESP*3),
    chi:      6+(lv*5)+(a.CHI*4),
    defesa:   (a.RES*2)+lv,
    esquiva:  (a.AGI*2)+a.PER
  };
}
function calcSlots(el){
  const base=2+Math.floor(G.level/3);
  return base+(G.scrolls[el]||0);
}
function usedSlots(el){
  let n=0;
  for(const subs of Object.values(G.activeSubSkills[el]||{})) n+=subs.length;
  return n;
}

function xpFor(lv){return lv<=1?0:Math.round(200*Math.pow(lv-1,1.55));}
function xpReq(lv){let a=0;for(let i=2;i<=lv;i++)a+=xpFor(i);return a;}
function addXP(n){
  G.xp+=n;
  while(G.level<MAX_LV&&G.xp>=xpReq(G.level+1)){G.level++;G.pts+=PTS_PER_LV;}
  renderAttrPanel();
  renderSkillPage(curElem);
  if(document.getElementById('pg-char').classList.contains('on')) renderCharPage();
}

function addA(k){if(G.pts<=0||G.attrs[k]>=ATTR_MAX)return;G.attrs[k]++;G.pts--;renderAttrPanel();renderSkillPage(curElem);if(document.getElementById('pg-char').classList.contains('on'))renderCharPage();}
function remA(k){if(G.attrs[k]<=0)return;G.attrs[k]--;G.pts++;renderAttrPanel();renderSkillPage(curElem);if(document.getElementById('pg-char').classList.contains('on'))renderCharPage();}

function meetsReqs(r){return Object.entries(r).every(([k,v])=>G.attrs[k]>=v);}
function findSkill(el,name){for(const c of ['spirit','agility','precise','brute']){const s=(ELEMS[el]?.cats[c]||[]).find(x=>x.n===name);if(s)return{s,c};}return null;}
function canUnlock(el,s){return meetsReqs(s.reqs)&&(s.req.length===0||s.req.every(r=>G.unlocked[el][r]));}

function toggleSkill(el,name){
  const res=findSkill(el,name);if(!res)return;
  const{s}=res;
  if(G.unlocked[el][name]){
    for(const c of ['spirit','agility','precise','brute'])
      for(const sk of ELEMS[el].cats[c])
        if(sk.req.includes(name)&&G.unlocked[el][sk.n])return;
    delete G.unlocked[el][name];
    delete G.activeSubSkills[el][name];
  } else {
    if(!canUnlock(el,s))return;
    G.unlocked[el][name]=true;
    G.activeSubSkills[el][name]=[];
  }
  renderSkillPage(el);
  if(document.getElementById('pg-char').classList.contains('on'))renderCharPage();
}

// SUB-SKILLS (slots)
function toggleSubSkill(el,skillName,atkIdx){
  const scrolls=G.scrolls[el]||0;
  const cap=SLOT_CAP+scrolls;
  const totalSlots=calcSlots(el);
  const used=usedSlots(el);
  const subs=G.activeSubSkills[el][skillName]||[];
  const pos=subs.indexOf(atkIdx);
  if(pos>=0){
    // deactivate
    subs.splice(pos,1);
    G.activeSubSkills[el][skillName]=subs;
  } else {
    // Check caps
    if(subs.length>=cap){alert(`Maximo de ${cap} sub-habilidades para esta habilidade. Usa pergaminhos para ultrapassar.`);return;}
    if(used>=totalSlots){alert(`Sem slots disponiveis (${totalSlots} total). Sobe de nivel ou usa pergaminhos.`);return;}
    subs.push(atkIdx);
    G.activeSubSkills[el][skillName]=subs;
  }
  renderSkillPage(el);
}

function renderSkillPage(el){
  const elKey=el==='ar'?'air':el;
  const data=ELEMS[elKey];
  if(!data){document.getElementById('pg-'+el).innerHTML='<p style="color:var(--text3);padding:20px">Elemento nao encontrado.</p>';return;}
  const tNames=elKey==='none'?{0:"Recruta",1:"Veterano",2:"Elite",3:"Lenda"}:{0:"Iniciante",1:"Avancado",2:"Mestre",3:"Lendario"};
  let h=`<div class="two-col"><div class="attr-panel">
    <div class="panel-title">Atributos</div>
    <div class="level-row">
      <div><div class="lv-lbl">Nivel</div><div class="lv-num" id="lv-disp">${G.level}</div></div>
      <div style="text-align:right"><div class="lv-lbl">XP</div><div class="lv-num" id="xp-disp" style="font-size:14px;color:var(--text2)">${G.xp.toLocaleString()}</div></div>
    </div>
    <div class="pts-box">Pontos: <span class="pts-val" id="pts-avail">${G.pts}</span></div>
    <div id="attrs-wrap"></div>
    <div class="stats-box" id="stats-wrap"></div>
    <div class="xp-wrap">
      <div class="xp-hd"><span id="xp-cur">${G.xp.toLocaleString()} XP</span><span id="xp-nxt">${xpReq(G.level+1).toLocaleString()} XP</span></div>
      <div class="xp-bg"><div class="xp-fill" id="xp-bar" style="width:0%"></div></div>
      <button class="xp-btn" onclick="addXP(500)">+ 500 XP (teste)</button>
    </div>
  </div>
  <div>
    <div class="cat-tabs">${['spirit','agility','precise','brute'].map(c=>`<button class="ctab ${c}${curCat===c?' on':''}" onclick="switchCat('${elKey}','${c}')">${CAT_LABELS[c]}</button>`).join('')}</div>`;

  for(const cat of ['spirit','agility','precise','brute']){
    const skills=data.cats[cat]||[];
    const tg={};
    skills.forEach(s=>{const t=s.tier||0;if(!tg[t])tg[t]=[];tg[t].push(s);});
    h+=`<div class="cat-panel${curCat===cat?' on':''}">
      <div class="cat-desc">${CAT_DESCS[elKey]?.[cat]||''}</div>`;
    [0,1,2,3].forEach(ti=>{
      if(!tg[ti]||!tg[ti].length)return;
      h+=`<div class="tier-lbl">${tNames[ti]}</div><div class="skills-grid">`;
      tg[ti].forEach(s=>{
        const isLeg=ti===3;
        const on=!!G.unlocked[elKey][s.n];
        const lk=!canUnlock(elKey,s);
        const badge=isLeg?`<span class="sbadge sb-leg">Lendaria</span>`:`<span class="sbadge ${TIER_BADGES[ti]||'sb-t1'}">${tNames[ti]}</span>`;
        h+=`<div class="sc ${cat}${on?' on':''}${lk?' locked':''}${isLeg?' legend':''}" onclick="toggleSkill('${elKey}','${s.n.replace(/'/g,"\'")}')">
          <div class="sdot"></div>
          <div class="smeta">${badge}${posH(s.pos)}</div>
          <div class="sname">${s.n}</div>
          <div class="sdesc">${s.d}</div>
          <div class="req-attr">${chipH(s.reqs)}</div>
          ${s.req.length?`<div class="req-line">Req: ${s.req.join(', ')}</div>`:''}
          ${renderEff(s.effect)}
          ${renderAtks(s,elKey,on)}
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;
  }
  h+=`</div></div>`;
  document.getElementById('pg-'+el).innerHTML=h;
  renderAttrPanel();
}

function switchCat(el,c){
  curCat=c;
  const pgEl=el==='air'?'ar':el;
  renderSkillPage(pgEl);
  // Se estamos na página de habilidades, atualizar o conteúdo visível
  if(document.getElementById('pg-habilidades').classList.contains('on')){
    renderHabilidadesPage();
  }
}

    const specBadge=item.efeito?`<div style="font-size:9px;color:var(--gold);margin-top:4px">${item.efeito}</div>`:
      item.efeito_especial?`<div style="font-size:9px;color:var(--gold);margin-top:4px">${item.efeito_especial}</div>`:'';

    <b style="color:var(--text)">Sistema de Progressao</b> — Nivel max: <b>40</b> | 3 pontos/nivel | 120 pontos totais ao nivel 40.<br>
    Slots de sub-habilidades: 2 + Math.floor(nivel/3) base | Cap por habilidade: 3 (pergaminhos ultrapassam).<br>
    Sequencia de combate: 1d20+bonus vs Esquiva → Escudos → Defesa → PV/PE.
  </div>
  <table class="xp-tbl">
    <thead><tr><th>Nv</th><th>XP p/nivel</th><th>XP acumulado</th><th>Pts ganhos</th><th>Pts totais</th><th>Slots base</th><th>Marco</th></tr></thead>
    <tbody>`;
  let acc=0;
  for(let lv=1;lv<=40;lv++){
    const n=xpFor(lv);acc+=n;
    const m=ms[lv]||'';
    const slots=2+Math.floor(lv/3);
    h+=`<tr${m?' class="mile"':''}><td>${lv}</td><td>${lv===1?'-':n.toLocaleString()}</td><td>${(acc-n).toLocaleString()}</td><td>${lv===1?'3 iniciais':'+3'}</td><td>${(lv-1)*3+3}</td><td>${slots}</td><td>${m||'-'}</td></tr>`;
  }
  h+=`</tbody></table></div>`;
  document.getElementById('pg-xptable').innerHTML=h;
}

// ======================================================
// PAGE NAVIGATION
// ======================================================
function showPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('on'));
  // Redirecionar elementos para pg-habilidades
  const elems=['fire','water','earth','ar','none','habilidades'];
  if(elems.includes(p)){
    document.getElementById('pg-habilidades').classList.add('on');
    document.querySelector('.nav-btn.fire')?.classList.add('on');
    if(p!=='habilidades'){const ek=p==='ar'?'air':p;curElem=ek;}
    renderHabilidadesPage();
    return;
  }
  const pg=document.getElementById('pg-'+p);
  if(pg)pg.classList.add('on');
  const btn=document.querySelector('.nav-btn.'+p);
  if(btn)btn.classList.add('on');
  else document.querySelectorAll('.nav-btn').forEach(b=>{if(b.getAttribute('onclick')?.includes("'"+p+"'"))b.classList.add('on');});
  if(p==='char')renderCharPage();
  else if(p==='items')renderItemsPage();
  else if(p==='xptable')renderXPTable();
}

function renderHabilidadesPage(){
  const el=curElem||'fire';
  const elLabels={fire:'🔥 Fogo',water:'💧 Água',earth:'🪨 Terra',air:'🌬 Ar',none:'⚔️ Sem Dobra'};
  const elKeys=['fire','water','earth','air','none'];
  // Renderizar conteúdo no pg-habilidades directamente
  // Primeiro fazer render da skill page no div interno
  const pgId=el==='air'?'pg-ar':'pg-'+el;
  renderSkillPage(el==='air'?'ar':el);
  const inner=document.getElementById(pgId);
  const selHtml=elKeys.map(k=>`<button class="esbtn ${k}${k===el?' on':''}" onclick="curElem='${k}';renderHabilidadesPage()">${elLabels[k]}</button>`).join('');
  document.getElementById('pg-habilidades').innerHTML=
    `<div class="elem-sel">${selHtml}</div>`+
    (inner?inner.innerHTML:'<p style="color:var(--text3);padding:20px">Carregando...</p>');
}

// ======================================================
// INIT
// ======================================================
renderCharPage();
renderXPTable();
renderItemsPage();
</script>
</body>
</html>
